- name: Check if docker is installed
  ansible.builtin.command: >
    which docker
  register: docker_check
  failed_when:
    - docker_check.rc != 0

- name: Check if docker compose is installed
  ansible.builtin.command: >
    docker compose version
  register: docker_compose_check
  failed_when:
    - docker_compose_check.rc != 0

- name: Ensure all necessary directories exist
  file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "/{{ dptb_root_dir}}/{{ dptb_main_dir }}"
    - "/{{ dptb_root_dir}}/{{ dptb_main_dir }}/{{ dptb_config_dir }}"
  become: true

- name: Docker Login
  ansible.builtin.shell: >
    echo {{ gitlab_registry_token }} | docker login -u {{ gitlab_registry_username }} --password-stdin {{ gitlab_registry }}

- name: Update docker-compose.yaml
  template:
    src: "docker-compose.yaml.j2"
    dest: "/{{ dptb_root_dir}}/{{ dptb_main_dir }}/docker-compose.yaml"
  become: true

- name: Update env's
  template:
    src: "dptb-env.j2"
    dest: "/{{ dptb_root_dir}}/{{ dptb_main_dir }}/.dptb-env"
  become: true

- name: Start Service
  ansible.builtin.shell: >
    docker compose up -d
  args:
    chdir: "/{{ dptb_root_dir}}/{{ dptb_main_dir }}"
